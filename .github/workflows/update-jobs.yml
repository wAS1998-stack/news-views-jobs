name: Update jobs

on:
  schedule:
    # 3x/day (UTC) ≈ 08:00, 14:00, 19:00 IST
    - cron: "30 2,8,13 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Fetch new jobs from feeds (AI auto-fills details if key present)
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}         # add this secret -> rich pages (recommended)
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}   # alternative to OpenAI
          JOBS_FEEDS: ${{ secrets.JOBS_FEEDS }}                 # optional override; feeds normally come from config.json
        run: node fetch-jobs.js

      - name: Commit if anything changed
        id: commit
        run: |
          git config user.name  "jobs-bot"
          git config user.email "actions@users.noreply.github.com"
          if [ -n "$(git status --porcelain data/)" ]; then
            git add data/jobs.json data/updates.json
            git commit -m "Auto: new job listings & updates"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Pushed — Cloudflare will redeploy automatically."
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No changes."
          fi

      - name: Notify Google (Indexing API — job pages only)
        if: steps.commit.outputs.changed == 'true'
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}  # optional -> near-instant indexing
        run: node ping-google.js
